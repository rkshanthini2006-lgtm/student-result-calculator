<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>

        <header>
            <h1>STUDENT RESULT CALCULATOR</h1>
        </header>

        <!-- Student Details -->
        <section>

            <h2>Student Details</h2>

            <div>
                <label for="studentName">Student Name</label>
                <input
                    type="text"
                    id="studentName"
                    placeholder="Enter Student Name">
            </div>

            <div>
                <label for="registerNumber">Register Number</label>
                <input
                    type="text"
                    id="registerNumber"
                    placeholder="Enter Register Number">
            </div>

        </section>

        <!-- Marks Section -->
        <section>

            <h2>Subject Marks</h2>

            <div>
                <label for="subject1">English</label>
                <input
                    type="number"
                    id="subject1"
                    placeholder="Enter Marks"
                    min="0"
                    max="100">
            </div>

            <div>
                <label for="subject2">Mathematics</label>
                <input
                    type="number"
                    id="subject2"
                    placeholder="Enter Marks"
                    min="0"
                    max="100">
            </div>

            <div>
                <label for="subject3">Science</label>
                <input
                    type="number"
                    id="subject3"
                    placeholder="Enter Marks"
                    min="0"
                    max="100">
            </div>

            <div>
                <label for="subject4">Social Science</label>
                <input
                    type="number"
                    id="subject4"
                    placeholder="Enter Marks"
                    min="0"
                    max="100">
            </div>

            <div>
                <label for="subject5">Computer Science</label>
                <input
                    type="number"
                    id="subject5"
                    placeholder="Enter Marks"
                    min="0"
                    max="100">
            </div>

        </section>

        <!-- Buttons -->
        <section>

            <div class="button-group">

                <button id="calculateBtn">
                    Calculate Result
                </button>

                <button id="resetBtn" type="button">
                    Reset
                </button>

                <button id="printBtn" type="button">
                    Print Result
                </button>

            </div>

        </section>

        <!-- Result -->
        <section class="result-card">

            <h2>Result</h2>
<p>
    <strong>Student Name:</strong>
    <span id="displayStudentName">--</span>
</p>

<p>
    <strong>Register Number:</strong>
    <span id="displayRegisterNumber">--</span>
</p>
<p>
    <strong>Generated On:</strong>
    <span id="generatedDate">--</span>
</p>
            <p>
                Total :
                <span id="total">--</span>
            </p>

            <p>
                Average :
                <span id="average">--</span>
            </p>
<p>
    Percentage :
    <span id="percentage">--</span>%
</p>
            <p>
                Grade :
                <span id="grade">--</span>
            </p>

            <p>
                Result :
                <span id="result">--</span>
            </p>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
